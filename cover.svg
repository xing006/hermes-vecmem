<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#041C1C;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#041C1C;stop-opacity:1" />
    </linearGradient>
    <!-- Glow effects -->
    <radialGradient id="glow1" cx="30%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="50%" r="35%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0" />
    </radialGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a3a3a" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- ====== 程序老炮 (左侧) ====== -->

  <!-- Body -->
  <rect x="130" y="230" width="130" height="150" rx="15" fill="#1e3a3a" stroke="#34d399" stroke-width="1.5"/>
  <!-- Collar -->
  <rect x="155" y="220" width="80" height="25" rx="5" fill="#0a2a2a" stroke="#34d399" stroke-width="1"/>

  <!-- Head -->
  <circle cx="195" cy="185" r="45" fill="#f5d5b8" stroke="#d4a574" stroke-width="1.5"/>
  <!-- Hair (graying, slightly messy) -->
  <path d="M 155 170 Q 160 135 195 130 Q 230 135 235 170" fill="#4a5568" stroke="#2d3748" stroke-width="1"/>
  <path d="M 160 175 Q 165 140 195 135 Q 225 140 230 175" fill="#718096" opacity="0.5"/>
  <!-- Glasses -->
  <rect x="165" y="175" width="28" height="18" rx="4" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="197" y="175" width="28" height="18" rx="4" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
  <line x1="193" y1="184" x2="197" y2="184" stroke="#22d3ee" stroke-width="1.5"/>
  <!-- Eyes -->
  <circle cx="179" cy="184" r="2.5" fill="#1a202c"/>
  <circle cx="211" cy="184" r="2.5" fill="#1a202c"/>
  <!-- Smile -->
  <path d="M 183 200 Q 195 210 207 200" fill="none" stroke="#c0564b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Moustache -->
  <path d="M 175 195 Q 185 198 195 195 Q 205 198 215 195" fill="none" stroke="#4a5568" stroke-width="1.5"/>

  <!-- Left arm (coding) -->
  <rect x="105" y="250" width="35" height="12" rx="4" fill="#1e3a3a" stroke="#34d399" stroke-width="1"/>
  <rect x="90" y="245" width="20" height="18" rx="5" fill="#f5d5b8" stroke="#d4a574" stroke-width="1"/>
  <!-- Right arm (pointing at Agent / collaborating) -->
  <rect x="255" y="260" width="60" height="12" rx="4" fill="#1e3a3a" stroke="#34d399" stroke-width="1"/>
  <circle cx="318" cy="266" r="8" fill="#f5d5b8" stroke="#d4a574" stroke-width="1"/>

  <!-- Legs -->
  <rect x="145" y="375" width="40" height="45" rx="5" fill="#1a2a2a" stroke="#34d399" stroke-width="1"/>
  <rect x="205" y="375" width="40" height="45" rx="5" fill="#1a2a2a" stroke="#34d399" stroke-width="1"/>
  <!-- Shoes -->
  <rect x="140" y="415" width="50" height="15" rx="6" fill="#2d3748" stroke="#34d399" stroke-width="1"/>
  <rect x="200" y="415" width="50" height="15" rx="6" fill="#2d3748" stroke="#34d399" stroke-width="1"/>

  <!-- Laptop -->
  <rect x="80" y="290" width="100" height="60" rx="5" fill="#0a2a2a" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="85" y="295" width="90" height="45" rx="3" fill="#041C1C"/>
  <!-- Code lines on screen -->
  <rect x="90" y="302" width="70" height="3" rx="1.5" fill="#22d3ee" opacity="0.6"/>
  <rect x="90" y="310" width="50" height="3" rx="1.5" fill="#34d399" opacity="0.6"/>
  <rect x="90" y="318" width="60" height="3" rx="1.5" fill="#a78bfa" opacity="0.6"/>
  <rect x="90" y="326" width="40" height="3" rx="1.5" fill="#fbbf24" opacity="0.6"/>
  <rect x="90" y="334" width="55" height="3" rx="1.5" fill="#22d3ee" opacity="0.5"/>

  <!-- ====== AI Agent (右侧) ====== -->

  <!-- Body (robot/futuristic) -->
  <rect x="750" y="210" width="120" height="170" rx="20" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="2"/>
  <!-- Chest plate -->
  <rect x="770" y="240" width="80" height="50" rx="8" fill="rgba(76,29,149,0.2)" stroke="#a78bfa" stroke-width="1"/>
  <!-- Core/light on chest -->
  <circle cx="810" cy="265" r="8" fill="#22d3ee" opacity="0.8"/>
  <circle cx="810" cy="265" r="4" fill="#fff" opacity="0.6"/>

  <!-- Head -->
  <rect x="770" y="155" width="80" height="60" rx="12" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="2"/>
  <!-- Face screen -->
  <rect x="778" y="163" width="64" height="30" rx="6" fill="#041C1C" stroke="#22d3ee" stroke-width="1"/>

  <!-- Eyes (digital/HUD style) -->
  <circle cx="795" cy="178" r="4" fill="#22d3ee" opacity="0.9"/>
  <circle cx="825" cy="178" r="4" fill="#22d3ee" opacity="0.9"/>
  <circle cx="795" cy="178" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="825" cy="178" r="2" fill="#fff" opacity="0.5"/>

  <!-- Antenna -->
  <line x1="810" y1="155" x2="810" y2="135" stroke="#a78bfa" stroke-width="2"/>
  <circle cx="810" cy="132" r="5" fill="#22d3ee" opacity="0.8"/>
  <circle cx="810" cy="132" r="2" fill="#fff" opacity="0.6"/>

  <!-- Signal waves from antenna -->
  <path d="M 795 122 Q 800 115 810 115 Q 820 115 825 122" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
  <path d="M 785 112 Q 795 100 810 100 Q 825 100 835 112" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.25"/>

  <!-- Left arm (receiving from programmer) -->
  <rect x="720" y="245" width="35" height="12" rx="4" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="1"/>
  <circle cx="720" cy="251" r="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>

  <!-- Right arm (pointing up / thinking) -->
  <rect x="865" y="230" width="35" height="12" rx="4" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="1"/>
  <circle cx="883" cy="226" r="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>

  <!-- Legs -->
  <rect x="765" y="375" width="35" height="40" rx="5" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="1"/>
  <rect x="820" y="375" width="35" height="40" rx="5" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="1"/>
  <!-- Feet -->
  <rect x="758" y="410" width="45" height="12" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
  <rect x="817" y="410" width="45" height="12" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>

  <!-- ====== Collaboration connection ====== -->

  <!-- Data flow between them -->
  <path d="M 330 270 Q 400 200 500 230 Q 600 260 710 260" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="6,3" opacity="0.6" marker-end="url(#arrowCyan)"/>
  <path d="M 710 280 Q 600 300 500 290 Q 400 280 330 300" fill="none" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6,3" opacity="0.6" marker-end="url(#arrowViolet)"/>

  <!-- Connection label -->
  <text x="450" y="250" fill="#94a3b8" font-size="11" font-family="monospace" text-anchor="middle">vecmem 插件</text>
  <text x="450" y="265" fill="#64748b" font-size="9" font-family="monospace" text-anchor="middle">向量记忆桥接</text>

  <!-- Sparkles / nodes along the path -->
  <circle cx="430" cy="235" r="2" fill="#22d3ee" opacity="0.6"/>
  <circle cx="500" cy="245" r="3" fill="#a78bfa" opacity="0.6"/>
  <circle cx="570" cy="255" r="2" fill="#22d3ee" opacity="0.6"/>

  <!-- ====== Title ====== -->

  <!-- Title background bar -->
  <rect x="0" y="460" width="1200" height="80" fill="#041C1C" opacity="0.6"/>
  <rect x="100" y="460" width="1000" height="80" rx="8" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>

  <!-- Main title -->
  <text x="600" y="498" fill="#f1f5f9" font-size="28" font-family="monospace" font-weight="700" text-anchor="middle" letter-spacing="2">
    我给 Hermes Agent 写了个外挂大脑
  </text>
  <text x="600" y="525" fill="#94a3b8" font-size="12" font-family="monospace" font-weight="400" text-anchor="middle" letter-spacing="1">
    从零实现 sqlite-vec 向量记忆插件 / 开源实战
  </text>

  <!-- ====== Tags ====== -->
  <rect x="300" y="545" width="100" height="24" rx="12" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1" opacity="0.6"/>
  <text x="350" y="561" fill="#22d3ee" font-size="10" font-family="monospace" text-anchor="middle">Hermes Agent</text>

  <rect x="415" y="545" width="80" height="24" rx="12" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1" opacity="0.6"/>
  <text x="455" y="561" fill="#34d399" font-size="10" font-family="monospace" text-anchor="middle">sqlite-vec</text>

  <rect x="510" y="545" width="70" height="24" rx="12" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
  <text x="545" y="561" fill="#a78bfa" font-size="10" font-family="monospace" text-anchor="middle">向量记忆</text>

  <rect x="595" y="545" width="90" height="24" rx="12" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1" opacity="0.6"/>
  <text x="640" y="561" fill="#fbbf24" font-size="10" font-family="monospace" text-anchor="middle">开源插件</text>

  <!-- ====== Footer ====== -->
  <text x="600" y="600" fill="#475569" font-size="9" font-family="monospace" text-anchor="middle">ZHANG · github.com/xing006/hermes-vecmem</text>

  <!-- Bottom accent line -->
  <rect x="400" y="612" width="400" height="2" rx="1" fill="url(#bgGrad)" opacity="0.5"/>
</svg>
